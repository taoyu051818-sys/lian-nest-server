<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Provider Pool Dashboard</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --border: #2a2d3a;
      --text: #e1e4ed;
      --text-muted: #8b8fa3;
      --accent: #6c8cff;
      --green: #34d399;
      --yellow: #fbbf24;
      --red: #f87171;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
      min-height: 100vh;
    }
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 24px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
    }
    header h1 { font-size: 18px; font-weight: 600; }
    .badge {
      display: inline-block;
      padding: 2px 10px;
      border-radius: 12px;
      font-size: 12px;
      font-weight: 500;
    }
    .badge--static { background: var(--accent); color: #fff; }
    .badge--ok { background: rgba(52,211,153,.15); color: var(--green); }
    .badge--warn { background: rgba(251,191,36,.15); color: var(--yellow); }
    .badge--err { background: rgba(248,113,113,.15); color: var(--red); }

    main { padding: 24px; max-width: 1200px; margin: 0 auto; }

    /* Summary row */
    .summary {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 16px;
      margin-bottom: 24px;
    }
    .summary-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 16px;
    }
    .summary-card__label { font-size: 12px; color: var(--text-muted); text-transform: uppercase; letter-spacing: .04em; }
    .summary-card__value { font-size: 28px; font-weight: 700; margin-top: 4px; }

    /* Section */
    .section { margin-bottom: 24px; }
    .section__title {
      font-size: 14px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .04em;
      color: var(--text-muted);
      margin-bottom: 12px;
    }

    /* Table */
    .table-wrap {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
    }
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    th {
      text-align: left;
      padding: 10px 16px;
      font-weight: 600;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: .04em;
      color: var(--text-muted);
      border-bottom: 1px solid var(--border);
    }
    td {
      padding: 10px 16px;
      border-bottom: 1px solid var(--border);
    }
    tr:last-child td { border-bottom: none; }
    .mono { font-family: 'SF Mono', 'Fira Code', monospace; font-size: 12px; }

    /* Bar */
    .bar-track {
      height: 6px;
      background: var(--border);
      border-radius: 3px;
      overflow: hidden;
      min-width: 80px;
    }
    .bar-fill {
      height: 100%;
      border-radius: 3px;
      transition: width .3s;
    }
    .bar-fill--green { background: var(--green); }
    .bar-fill--yellow { background: var(--yellow); }
    .bar-fill--red { background: var(--red); }

    footer {
      text-align: center;
      padding: 16px;
      font-size: 11px;
      color: var(--text-muted);
      border-top: 1px solid var(--border);
    }
  </style>
</head>
<body>
  <header>
    <h1>Provider Pool Dashboard</h1>
    <span class="badge badge--static">Static Skeleton</span>
  </header>

  <main>
    <!-- Summary Cards -->
    <div class="summary" id="summary-cards"></div>

    <!-- Providers Table -->
    <div class="section">
      <div class="section__title">Providers</div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>ID</th>
              <th>Name</th>
              <th>Status</th>
              <th>Type</th>
              <th>Workers</th>
              <th>Load</th>
            </tr>
          </thead>
          <tbody id="providers-body"></tbody>
        </table>
      </div>
    </div>

    <!-- Workers Table -->
    <div class="section">
      <div class="section__title">Workers</div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>ID</th>
              <th>Provider</th>
              <th>Status</th>
              <th>Current Task</th>
              <th>Uptime</th>
              <th>Memory</th>
            </tr>
          </thead>
          <tbody id="workers-body"></tbody>
        </table>
      </div>
    </div>

    <!-- Resources Table -->
    <div class="section">
      <div class="section__title">Resources</div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Resource</th>
              <th>Total</th>
              <th>Used</th>
              <th>Available</th>
              <th>Utilization</th>
            </tr>
          </thead>
          <tbody id="resources-body"></tbody>
        </table>
      </div>
    </div>
  </main>

  <footer>Provider Pool Dashboard &mdash; Static Skeleton &middot; Data shown is placeholder</footer>

  <script>
    // Static placeholder data for the dashboard skeleton
    var PLACEHOLDER = {
      summary: [
        { label: 'Total Providers', value: 4 },
        { label: 'Active Workers', value: 12 },
        { label: 'Queued Tasks', value: 7 },
        { label: 'Avg Latency', value: '42ms' }
      ],
      providers: [
        { id: 'prov-001', name: 'Primary LLM', status: 'ok', type: 'openai', workers: 4, load: 68 },
        { id: 'prov-002', name: 'Backup LLM', status: 'ok', type: 'anthropic', workers: 3, load: 45 },
        { id: 'prov-003', name: 'Embeddings', status: 'warn', type: 'openai', workers: 3, load: 89 },
        { id: 'prov-004', name: 'Image Gen', status: 'err', type: 'stability', workers: 2, load: 12 }
      ],
      workers: [
        { id: 'wk-001', provider: 'prov-001', status: 'ok', task: 'chat-completion', uptime: '4h 12m', memory: 62 },
        { id: 'wk-002', provider: 'prov-001', status: 'ok', task: 'chat-completion', uptime: '4h 12m', memory: 58 },
        { id: 'wk-003', provider: 'prov-001', status: 'ok', task: 'idle', uptime: '4h 12m', memory: 31 },
        { id: 'wk-004', provider: 'prov-001', status: 'ok', task: 'chat-completion', uptime: '4h 12m', memory: 70 },
        { id: 'wk-005', provider: 'prov-002', status: 'ok', task: 'chat-completion', uptime: '2h 05m', memory: 55 },
        { id: 'wk-006', provider: 'prov-002', status: 'ok', task: 'idle', uptime: '2h 05m', memory: 28 },
        { id: 'wk-007', provider: 'prov-002', status: 'ok', task: 'chat-completion', uptime: '2h 05m', memory: 61 },
        { id: 'wk-008', provider: 'prov-003', status: 'warn', task: 'embedding', uptime: '6h 30m', memory: 87 },
        { id: 'wk-009', provider: 'prov-003', status: 'ok', task: 'embedding', uptime: '6h 30m', memory: 72 },
        { id: 'wk-010', provider: 'prov-003', status: 'ok', task: 'embedding', uptime: '6h 30m', memory: 69 },
        { id: 'wk-011', provider: 'prov-004', status: 'err', task: 'image-gen', uptime: '0m', memory: 0 },
        { id: 'wk-012', provider: 'prov-004', status: 'ok', task: 'image-gen', uptime: '1h 10m', memory: 44 }
      ],
      resources: [
        { name: 'CPU Cores', total: 32, used: 21 },
        { name: 'Memory (GB)', total: 64, used: 42 },
        { name: 'GPU (units)', total: 8, used: 6 },
        { name: 'API Concurrency', total: 30, used: 24 }
      ]
    };

    function badgeClass(status) {
      if (status === 'ok') return 'badge--ok';
      if (status === 'warn') return 'badge--warn';
      return 'badge--err';
    }

    function statusLabel(status) {
      if (status === 'ok') return 'Healthy';
      if (status === 'warn') return 'Warning';
      return 'Error';
    }

    function barClass(pct) {
      if (pct < 60) return 'bar-fill--green';
      if (pct < 85) return 'bar-fill--yellow';
      return 'bar-fill--red';
    }

    function renderSummary() {
      var el = document.getElementById('summary-cards');
      el.innerHTML = PLACEHOLDER.summary.map(function(item) {
        return '<div class="summary-card">' +
          '<div class="summary-card__label">' + item.label + '</div>' +
          '<div class="summary-card__value">' + item.value + '</div>' +
          '</div>';
      }).join('');
    }

    function renderProviders() {
      var el = document.getElementById('providers-body');
      el.innerHTML = PLACEHOLDER.providers.map(function(p) {
        return '<tr>' +
          '<td class="mono">' + p.id + '</td>' +
          '<td>' + p.name + '</td>' +
          '<td><span class="badge ' + badgeClass(p.status) + '">' + statusLabel(p.status) + '</span></td>' +
          '<td>' + p.type + '</td>' +
          '<td>' + p.workers + '</td>' +
          '<td><div class="bar-track"><div class="bar-fill ' + barClass(p.load) + '" style="width:' + p.load + '%"></div></div></td>' +
          '</tr>';
      }).join('');
    }

    function renderWorkers() {
      var el = document.getElementById('workers-body');
      el.innerHTML = PLACEHOLDER.workers.map(function(w) {
        return '<tr>' +
          '<td class="mono">' + w.id + '</td>' +
          '<td class="mono">' + w.provider + '</td>' +
          '<td><span class="badge ' + badgeClass(w.status) + '">' + statusLabel(w.status) + '</span></td>' +
          '<td>' + w.task + '</td>' +
          '<td>' + w.uptime + '</td>' +
          '<td><div class="bar-track"><div class="bar-fill ' + barClass(w.memory) + '" style="width:' + w.memory + '%"></div></div></td>' +
          '</tr>';
      }).join('');
    }

    function renderResources() {
      var el = document.getElementById('resources-body');
      el.innerHTML = PLACEHOLDER.resources.map(function(r) {
        var pct = Math.round((r.used / r.total) * 100);
        var avail = r.total - r.used;
        return '<tr>' +
          '<td>' + r.name + '</td>' +
          '<td>' + r.total + '</td>' +
          '<td>' + r.used + '</td>' +
          '<td>' + avail + '</td>' +
          '<td><div class="bar-track"><div class="bar-fill ' + barClass(pct) + '" style="width:' + pct + '%"></div></div></td>' +
          '</tr>';
      }).join('');
    }

    renderSummary();
    renderProviders();
    renderWorkers();
    renderResources();
  </script>
</body>
</html>
